    function Box({children,style={}}) {
      return <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,...style}}>{children}</div>;
    }

    function FL({label,children}) {
      return <div style={{marginBottom:13}}><div style={{fontSize:10.5,fontWeight:600,color:T.text2,marginBottom:5,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:".05em"}}>{label}</div>{children}</div>;
    }

    function Toast({msg,type,onClose}) {
      useEffect(()=>{const t=setTimeout(onClose,4000);return()=>clearTimeout(t);},[onClose]);
      const dc={success:T.green,error:T.red,info:T.blue,warning:T.goldL}[type]||T.goldL;
      return <div style={{position:"fixed",bottom:20,right:20,background:T.card2,border:`1px solid ${T.border2}`,borderRadius:9,padding:"12px 18px",fontSize:13,color:T.text,boxShadow:"0 8px 32px rgba(0,0,0,.6)",zIndex:9999,display:"flex",alignItems:"center",gap:10,maxWidth:360,animation:"up .3s ease"}}><div style={{width:7,height:7,borderRadius:"50%",background:dc,flexShrink:0}}/>{msg}</div>;
    }

    function Modal({children,onClose,wide}) {
      return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",backdropFilter:"blur(6px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><div onClick={e=>e.stopPropagation()} style={{background:T.card,border:`1px solid ${T.border2}`,borderRadius:14,padding:28,width:"100%",maxWidth:wide?620:480,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,.75)",animation:"up .32s cubic-bezier(.16,1,.3,1)"}}>{children}</div></div>;
    }

    function Logo({h=38,text=true}) {

      return <div style={{display:"flex",alignItems:"center",gap:10}}>
        {ok ? <img src="https://su.ac.ug/images/200/22537056/R-ld9s__U0LuuR9jAIJSLB1Q.png" onError={()=>setOk(false)} alt="Seeta University" style={{height:h,width:"auto",objectFit:"contain"}}/>
          : <div style={{height:h,width:h,background:`linear-gradient(135deg,${T.navy},${T.navyL})`,borderRadius:8,border:`2px solid ${T.gold}`,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:h*.35,fontWeight:700,color:T.goldL}}>SU</span></div>}
        {text && <div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:h*.52,fontWeight:700,color:T.text,lineHeight:1.1}}>SEETA University</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:h*.22,color:T.goldL,letterSpacing:".08em",textTransform:"uppercase",marginTop:1}}>A Place for Academic Excellence</div></div>}
      </div>;
    }

        <div style={{position:"absolute",top:0,left:0,right:0,height:2.5,background:`linear-gradient(90deg,transparent,${T.goldL},${T.goldXL},${T.goldL},transparent)`}}/>
        <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle at 75% 15%,rgba(180,140,40,.07) 0%,transparent 50%)",pointerEvents:"none"}}/>
        <div style={{position:"absolute",top:0,left:0,right:0,height:50,background:"linear-gradient(180deg,rgba(180,140,40,.05),transparent)",animation:"scan 5s linear infinite",pointerEvents:"none"}}/>
        <div style={{background:"rgba(10,20,60,.7)",padding:"6px 11px",borderBottom:"1px solid rgba(180,140,40,.18)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {ok?<img src="https://su.ac.ug/images/200/22537056/R-ld9s__U0LuuR9jAIJSLB1Q.png" onError={()=>setOk(false)} alt="SU" style={{height:18,objectFit:"contain"}}/>:<span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:11,fontWeight:700,color:T.goldL}}>SU</span>}
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:10,fontWeight:700,color:T.goldL,letterSpacing:".04em"}}>SEETA UNIVERSITY</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><Chip c={bit?"blue":"green"}>{code}</Chip></div>
        </div>
        <div style={{display:"flex",gap:11,padding:"9px 11px"}}>
          <div style={{width:65,height:78,background:`linear-gradient(140deg,${T.navy},#050e28)`,borderRadius:7,border:`1.5px solid rgba(180,140,40,.4)`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:"rgba(180,140,40,.55)"}}>{inits(student.name)}</span>
          </div>
          <div style={{flex:1,overflow:"hidden"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:13.5,fontWeight:700,color:"white",lineHeight:1.2,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{student.name}</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:pc,textTransform:"uppercase",letterSpacing:".07em",marginBottom:7}}>{student.program}</div>
            {[["REG NO",student.id],["INTAKE",student.intake],["EMAIL",student.email||"—"]].map(([k,v])=>(
              <div key={k} style={{display:"flex",gap:5,marginBottom:2.5}}>

          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:6.5,color:"rgba(180,140,40,.45)",letterSpacing:".07em"}}>MBALALA · MUKONO · UGANDA · su.ac.ug</span>
          <div style={{display:"flex",gap:1.5}}>{[...Array(13)].map((_,i)=><div key={i} style={{width:i%3===0?2.5:1.5,height:i%4===0?13:9,background:"rgba(255,255,255,.16)",borderRadius:1}}/>)}</div>

    function CheckIn({students,logs,onLog,goAdmin}) {
      const [step,setStep]=useState("id");
      const [sid,setSid]=useState("");
      const [digits,setDigits]=useState(["","","","","",""]);
      const [otp,setOtp]=useState("");
      const [student,setStudent]=useState(null);
      const [err,setErr]=useState("");
      const [busy,setBusy]=useState(false);
      const [expiry,setExpiry]=useState(null);
      const [secs,setSecs]=useState(300);
      const refs=[useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];

      useEffect(()=>{
        if(step!=="otp"||!expiry)return;
        const iv=setInterval(()=>{
          const left=Math.max(0,Math.ceil((expiry-Date.now())/1000));
          setSecs(left);
          if(left===0){setStep("id");setErr("OTP expired. Please try again.");}
        },1000);
        return()=>clearInterval(iv);
      },[step,expiry]);

      const lookup=e=>{
        e&&e.preventDefault(); setErr("");
        if(!sid.trim()){setErr("Please enter your Registration Number.");return;}
        const s=students.find(x=>matchId(x.id,sid));
        if(!s){setErr("Registration number not found in the system. Please verify your number or contact the Academic Registrar.");return;}
        if(s.status!=="active"){setErr("Your account has been deactivated. Please contact the Academic Registrar.");return;}
        const already=logs.find(l=>l.studentId===s.id&&l.date===todayStr());
        if(already){setErr(`Attendance already recorded today at ${already.time}.`);return;}
        setBusy(true);
        const code=genOTP();
        setOtp(code);
        setStudent(s);
        setTimeout(()=>{
          setBusy(false);
          setExpiry(Date.now()+300000);
          setSecs(300);
          setStep("otp");
        },800);
      };

      const handleDigit=(i,val)=>{
        const d=val.replace(/\D/,"").slice(0,1);
        const n=[...digits]; n[i]=d; setDigits(n);
        if(d&&i<5)refs[i+1].current?.focus();
      };
      const handleKey=(i,e)=>{if(e.key==="Backspace"&&!digits[i]&&i>0)refs[i-1].current?.focus();};

      const verify=e=>{
        e&&e.preventDefault(); setErr("");
        const entered=digits.join("");
        if(entered.length<6){setErr("Enter all 6 digits of your OTP.");return;}
        if(entered!==otp){setErr("Incorrect OTP. Please try again.");setDigits(["","","","","",""]);refs[0].current?.focus();return;}
        onLog({id:"L"+Date.now(),studentId:student.id,studentName:student.name,program:student.program,date:todayStr(),time:nowStr(),timestamp:Date.now()});
        setStep("done");
      };

      const reset=()=>{setStep("id");setSid("");setDigits(["","","","","",""]);setOtp("");setStudent(null);setErr("");};

      const dot={backgroundImage:`radial-gradient(rgba(180,140,40,.08) 1px,transparent 1px)`,backgroundSize:"30px 30px"};

      return <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,...dot}}>
        <div style={{position:"fixed",inset:0,backgroundImage:`radial-gradient(ellipse at 50% 0%,rgba(13,30,80,.7) 0%,transparent 60%)`,pointerEvents:"none"}}/>
        <div style={{width:"100%",maxWidth:430,position:"relative",zIndex:1}}>
          <div style={{textAlign:"center",marginBottom:26}}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:12}}><Logo h={46} text={true}/></div>
            <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(180,140,40,.07)",border:`1px solid rgba(180,140,40,.18)`,borderRadius:20,padding:"4px 14px",marginTop:6}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:T.green}} className="pulse"/>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9.5,color:T.goldL,letterSpacing:".09em"}}>SCHOOL OF COMPUTING & TECHNOLOGY</span>
            </div>
          </div>

          <Box style={{padding:28,border:`1px solid rgba(180,140,40,.2)`,boxShadow:`0 20px 60px rgba(0,0,0,.5)`}} className="anim-in">
            {step==="id" && <>
              <div style={{marginBottom:22}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.text,marginBottom:4}}>Student Attendance Check-In</div>
                <div style={{fontSize:12.5,color:T.text3,lineHeight:1.6}}>Enter your Registration Number to receive a one-time verification code on your registered phone number.</div>
              </div>
              <form onSubmit={lookup}>
                <FL label="Registration Number">
                  <input value={sid} onChange={e=>setSid(e.target.value)} placeholder="e.g. 25/08/BIT/U/0001" autoFocus style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,letterSpacing:".03em"}}/>
                </FL>
                {err&&<div style={{background:"rgba(217,68,85,.08)",border:"1px solid rgba(217,68,85,.2)",borderRadius:7,padding:"9px 13px",color:T.red,fontSize:12.5,marginBottom:13,lineHeight:1.5}}>{err}</div>}
                <Btn v="gold" sz="lg" full disabled={busy} onClick={lookup}>
                  {busy?<><span className="spin" style={{width:13,height:13,border:"2px solid rgba(0,0,0,.2)",borderTop:"2px solid #06101e",borderRadius:"50%",display:"inline-block"}}/> Verifying…</>:<><Ico n="sms" s={15}/>Send Verification Code</>}
                </Btn>
              </form>
            </>}

            {step==="otp" && student && <>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
                <Btn v="ghost" sz="sm" onClick={()=>{setStep("id");setErr("");setDigits(["","","","","",""]);}}><Ico n="back" s={13}/></Btn>
                <div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700}}>Enter Verification Code</div>
                  <div style={{fontSize:11.5,color:T.text3}}>A 6-digit code has been sent to your registered number</div>
                </div>
              </div>
              <div style={{background:T.bg3,border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 13px",marginBottom:18,display:"flex",alignItems:"center",gap:11}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:`linear-gradient(135deg,${T.navy},${T.navyL})`,border:`1.5px solid rgba(180,140,40,.35)`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Cormorant Garamond',serif",fontSize:13,fontWeight:700,color:T.goldL,flexShrink:0}}>{inits(student.name)}</div>
                <div>
                  <div style={{fontSize:13.5,fontWeight:600,color:T.text}}>{student.name}</div>
                  <div style={{fontSize:10.5,color:T.text3,fontFamily:"'JetBrains Mono',monospace",marginTop:1}}>{student.id}</div>
                </div>
                <Chip c={isBIT(student.program)?"blue":"green"} style={{marginLeft:"auto"}}>{isBIT(student.program)?"BIT":"BSE"}</Chip>
              </div>

              {!student.phone && <div style={{background:"rgba(180,140,40,.07)",border:`1px solid rgba(180,140,40,.18)`,borderRadius:7,padding:"8px 13px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:11.5,color:T.text3}}>Phone not on file — code shown below:</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:20,fontWeight:700,color:T.goldXL,letterSpacing:".18em"}}>{otp}</span>
              </div>}

              <form onSubmit={verify}>
                <FL label="6-Digit Code">
                  <div style={{display:"flex",gap:7}}>
                    {digits.map((d,i)=><input key={i} ref={refs[i]} value={d} onChange={e=>handleDigit(i,e.target.value)} onKeyDown={e=>handleKey(i,e)} maxLength={1} inputMode="numeric" style={{textAlign:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:700,padding:"10px 2px",flex:1}}/>)}
                  </div>
                </FL>
                <div style={{textAlign:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:secs<60?T.red:T.text3,marginBottom:13}}>
                  Code expires in {Math.floor(secs/60)}:{String(secs%60).padStart(2,"0")}
                </div>
                {err&&<div style={{background:"rgba(217,68,85,.08)",border:"1px solid rgba(217,68,85,.2)",borderRadius:7,padding:"9px 13px",color:T.red,fontSize:12.5,marginBottom:13}}>{err}</div>}
                <Btn v="gold" sz="lg" full onClick={verify}><Ico n="check" s={15}/>Confirm Check-In</Btn>
              </form>
              <Btn v="ghost" sz="sm" style={{width:"100%",marginTop:8}} onClick={lookup} disabled={busy}>Resend Code</Btn>
            </>}

            {step==="done" && student && <div style={{textAlign:"center"}} className="fade">
              <div style={{width:58,height:58,borderRadius:"50%",background:"rgba(34,176,104,.12)",border:"2px solid rgba(34,176,104,.35)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
                <Ico n="check" s={26} c={T.green}/>
              </div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,marginBottom:5}}>Attendance Recorded</div>
              <div style={{fontSize:13,color:T.text3,marginBottom:20,lineHeight:1.7}}>
                <strong style={{color:T.text}}>{student.name}</strong> — checked in at <span style={{fontFamily:"'JetBrains Mono',monospace",color:T.goldL}}>{nowStr()}</span>
              </div>
              <div style={{display:"flex",justifyContent:"center",marginBottom:20}}><IDCard student={student}/></div>
              <Btn v="gold" sz="lg" full onClick={reset}>Check In Next Student</Btn>
            </div>}
          </Box>

          <div style={{marginTop:16,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0 4px"}}>
            <span style={{fontSize:11,color:T.text3,fontFamily:"'JetBrains Mono',monospace"}}>Mbalala, Mukono · info@su.ac.ug</span>
            <button onClick={goAdmin} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:16,color:T.text3,fontFamily:"'JetBrains Mono',monospace",fontSize:10,cursor:"pointer",padding:"4px 12px",letterSpacing:".06em",transition:"all .2s"}}
              onMouseOver={e=>e.target.style.color=T.goldL} onMouseOut={e=>e.target.style.color=T.text3}>
              STAFF LOGIN
            </button>
          </div>
        </div>
      </div>;
    }

    function AdminLogin({admins,onLogin,onBack}) {
      const [u,setU]=useState(""); const [p,setP]=useState(""); const [err,setErr]=useState(""); const [busy,setBusy]=useState(false); const [show,setShow]=useState(false);
      const handle=e=>{
        e.preventDefault(); setErr("");
        if(!u||!p){setErr("Please enter your username and password.");return;}
        setBusy(true);
        setTimeout(()=>{
          const a=admins.find(x=>x.username===u&&x.password===p);
          setBusy(false);
          if(!a){setErr("Invalid credentials. Please try again or contact the IT administrator.");return;}
          onLogin(a);
        },700);
      };
      const dot={backgroundImage:`radial-gradient(rgba(180,140,40,.07) 1px,transparent 1px)`,backgroundSize:"28px 28px"};
      return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20,...dot}}>
        <div style={{position:"fixed",inset:0,backgroundImage:`radial-gradient(ellipse at 25% 20%,rgba(13,30,80,.75) 0%,transparent 58%)`,pointerEvents:"none"}}/>
        <div style={{width:"100%",maxWidth:390,position:"relative",zIndex:1}}>
          <Btn v="ghost" sz="sm" onClick={onBack} style={{marginBottom:20}}><Ico n="back" s={13}/>Return to Check-In</Btn>
          <Box style={{padding:28,border:`1px solid rgba(180,140,40,.2)`}} className="anim-in">
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
              <div style={{width:44,height:44,background:`linear-gradient(135deg,${T.navy},#040d22)`,borderRadius:11,border:`1px solid rgba(180,140,40,.25)`,display:"flex",alignItems:"center",justifyContent:"center"}}><Ico n="shield" s={21} c={T.goldL}/></div>
              <div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:700}}>Staff Login</div>
                <div style={{fontSize:11.5,color:T.text3}}>Seeta University — Authorised Personnel Only</div>
              </div>
            </div>
            <form onSubmit={handle}>
              <FL label="Username"><input value={u} onChange={e=>setU(e.target.value)} placeholder="your.username" autoComplete="username" autoFocus/></FL>
              <FL label="Password">
                <div style={{position:"relative"}}>
                  <input type={show?"text":"password"} value={p} onChange={e=>setP(e.target.value)} placeholder="••••••••" autoComplete="current-password" style={{paddingRight:40}}/>
                  <button type="button" onClick={()=>setShow(!show)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:T.text3,padding:2}}><Ico n="eye" s={15} c={T.text3}/></button>
                </div>
              </FL>
              {err&&<div style={{background:"rgba(217,68,85,.08)",border:"1px solid rgba(217,68,85,.2)",borderRadius:7,padding:"9px 13px",color:T.red,fontSize:12.5,marginBottom:13}}>{err}</div>}
              <Btn v="gold" sz="lg" full disabled={busy} onClick={handle}>{busy?"Authenticating…":<><Ico n="key" s={15}/>Sign In</>}</Btn>
            </form>
            <div style={{marginTop:16,paddingTop:14,borderTop:`1px solid ${T.border}`,fontSize:12,color:T.text3,textAlign:"center",lineHeight:1.6}}>
              Forgot your credentials? Contact the IT Administrator<br/>or email <span style={{color:T.goldL}}>it@su.ac.ug</span>
            </div>
          </Box>
          <div style={{textAlign:"center",marginTop:12,fontSize:11,color:T.text3}}>Mbalala, Mukono, Uganda · 0393 102905</div>
        </div>
      </div>;
    }

    function EditStudentModal({student,onClose,onSave}) {
      const [f,setF]=useState({...student});
      const [err,setErr]=useState("");
      const set=(k,v)=>setF(p=>({...p,[k]:v}));
      const save=()=>{
        if(!f.name.trim()||!f.id.trim()){setErr("Name and Registration Number are required.");return;}
        onSave(f);
      };
      return <Modal onClose={onClose}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:700}}>Edit Student Record</div>
          <Btn v="ghost" sz="sm" onClick={onClose}><Ico n="x" s={13}/></Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={{gridColumn:"1/-1"}}><FL label="Full Name"><input value={f.name} onChange={e=>set("name",e.target.value)}/></FL></div>
          <FL label="Registration No."><input value={f.id} onChange={e=>set("id",e.target.value)} style={{fontFamily:"'JetBrains Mono',monospace"}}/></FL>
          <FL label="Intake Year"><input value={f.intake} onChange={e=>set("intake",e.target.value)}/></FL>
          <div style={{gridColumn:"1/-1"}}><FL label="Programme">
            <select value={f.program} onChange={e=>set("program",e.target.value)}>
              <option value="Bachelor of Information Technology">Bachelor of Information Technology (BIT)</option>
              <option value="Bachelor of Science in Software Engineering">Bachelor of Science in Software Engineering (BSE)</option>
            </select>
          </FL></div>
          <FL label="Phone Number"><input value={f.phone} onChange={e=>set("phone",e.target.value)} placeholder="+256 700 000000"/></FL>
          <FL label="Academic Email"><input value={f.email} onChange={e=>set("email",e.target.value)} placeholder="student@su.ac.ug"/></FL>
          <div style={{gridColumn:"1/-1"}}><FL label="Status">
            <select value={f.status} onChange={e=>set("status",e.target.value)}>
              <option value="active">Active</option>
              <option value="inactive">Inactive / Suspended</option>
            </select>
          </FL></div>
        </div>
        {err&&<div style={{background:"rgba(217,68,85,.08)",border:"1px solid rgba(217,68,85,.2)",borderRadius:7,padding:"9px 13px",color:T.red,fontSize:12.5,marginBottom:13}}>{err}</div>}
        <div style={{display:"flex",gap:9,justifyContent:"flex-end"}}>
          <Btn v="ghost" onClick={onClose}>Cancel</Btn>
          <Btn v="gold" onClick={save}><Ico n="save" s={14}/>Save Changes</Btn>
        </div>
      </Modal>;

    function EditAdminModal({admin,onClose,onSave}) {
      const [f,setF]=useState({...admin,newPassword:""});
      const [err,setErr]=useState("");
      const set=(k,v)=>setF(p=>({...p,[k]:v}));
      const save=()=>{
        if(!f.name.trim()||!f.username.trim()||!f.email.trim()){setErr("Name, username, and email are required.");return;}
        if(f.newPassword&&f.newPassword.length<8){setErr("New password must be at least 8 characters.");return;}

      return <Modal onClose={onClose}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>

      const say=(msg,type="info")=>setToast({msg,type});
      const todayLogs=logs.filter(l=>l.date===todayStr());
      const canStu=["super_admin","registrar"].includes(admin.role);
      const canAdm=admin.role==="super_admin";

        {id:"overview",label:"Overview",ic:"dash"},

        ...(canAdm?[{id:"staff",label:"Staff Accounts",ic:"admin"}]:[]),
        {id:"sms",label:"SMS Settings",ic:"cfg"},

        if(!data.length){say("No data to export","warning");return;}
        const h=Object.keys(data[0]);
        const csv=[h.join(","),...data.map(r=>h.map(k=>`"${String(r[k]??"").replace(/"/g,'""')}"`).join(","))].join("\n");
        const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download=name;a.click();
        say("File exported successfully","success");
      };

        const q=stuQ.toLowerCase();

      });

      let attList=logs.filter(l=>{
        const q=attQ.toLowerCase();
        return l.date===attDate&&(!q||[l.studentName,l.studentId].some(v=>v.toLowerCase().includes(q)));

                            <Btn v="ghost" sz="sm" onClick={()=>setSelStu(s)} title="View ID Card"><Ico n="id" s={12}/></Btn>
                            {canStu&&<Btn v="ghost" sz="sm" onClick={()=>setEditStu(s)} title="Edit Details"><Ico n="edit" s={12}/></Btn>}
                            {canAdm&&<Btn v="danger" sz="sm" onClick={()=>{if(window.confirm(`Delete ${s.name}?`)){setStudents(p=>p.filter(x=>x.id!==s.id));say("Student record deleted","success");}}} title="Delete"><Ico n="trash" s={12}/></Btn>}
                          </div>
                        </td>
                      </tr>;
                    })}
                    {stuList.length===0&&<tr><td colSpan={8} style={{textAlign:"center",padding:28,color:T.text3}}>No students match your search.</td></tr>}
                    </tbody>
                  </table>
                </div>
              </Box>
            </div>}

            {page==="attendance" && <div className="anim-in">
              <div style={{display:"flex",gap:9,marginBottom:13,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div><div style={{fontSize:10,color:T.text3,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:5}}>Date</div><input type="date" value={attDate} onChange={e=>setAttDate(e.target.value)} max={todayStr()} style={{width:"auto"}}/></div>
                <div style={{flex:1,minWidth:160}}>
                  <div style={{fontSize:10,color:T.text3,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:5}}>Search</div>
                  <div style={{position:"relative"}}><div style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)"}}><Ico n="search" s={13} c={T.text3}/></div><input value={attQ} onChange={e=>setAttQ(e.target.value)} placeholder="Name or registration number…" style={{paddingLeft:32}}/></div>
                </div>
                <Btn v="ghost" sz="sm" onClick={()=>exportCSV(attList.map(l=>({"Reg No":l.studentId,Name:l.studentName,Programme:l.program,Date:l.date,"Check-in Time":l.time,Status:"Present"})),`attendance_${attDate}.csv`)}><Ico n="dl" s={13}/>Export CSV</Btn>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:13}}>
                {[["Present",new Set(attList.map(l=>l.studentId)).size,T.green],["Absent",students.length-new Set(attList.map(l=>l.studentId)).size,T.red],["BIT",new Set(attList.filter(l=>isBIT(l.program)).map(l=>l.studentId)).size,T.blue],["BSE",new Set(attList.filter(l=>!isBIT(l.program)).map(l=>l.studentId)).size,T.orange]].map(([lb,v,cl])=>(
                  <Box key={lb} style={{padding:"13px 15px"}}>
                    <div style={{fontSize:9.5,color:T.text3,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:4}}>{lb}</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:cl}}>{v}</div>
                  </Box>
                ))}
              </div>
              <Box style={{overflow:"hidden"}}>
                <div style={{padding:"10px 13px",borderBottom:`1px solid ${T.border}`,fontSize:12,color:T.text3}}>{attList.length} record{attList.length!==1?"s":""} — {fmtDate(attDate)}</div>
                <div style={{overflowX:"auto"}}>
                  <table>
                    <thead><tr><th>#</th><th>Reg. No.</th><th>Name</th><th>Programme</th><th>Check-in Time</th><th>Status</th></tr></thead>
                    <tbody>
                      {attList.map((l,i)=><tr key={l.id}>
                        <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.text3}}>{String(i+1).padStart(2,"0")}</td>
                        <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.gold}}>{l.studentId}</td>
                        <td style={{fontWeight:600,color:T.text}}>{l.studentName}</td>
                        <td><Chip c={isBIT(l.program)?"blue":"green"}>{isBIT(l.program)?"BIT":"BSE"}</Chip></td>
                        <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>{l.time}</td>
                        <td><Chip c="green">Present</Chip></td>
                      </tr>)}
                      {attList.length===0&&<tr><td colSpan={6} style={{textAlign:"center",padding:28,color:T.text3}}>No attendance records for {fmtDate(attDate)}.</td></tr>}
                    </tbody>
                  </table>
                </div>
              </Box>
            </div>}

            {page==="staff" && canAdm && <div className="anim-in">
              <div style={{display:"flex",justifyContent:"flex-end",marginBottom:13}}>
                <Btn v="gold" sz="sm" onClick={()=>setAddAdm(true)}><Ico n="plus" s={13}/>Add Staff Account</Btn>
              </div>
              <Box style={{overflow:"hidden"}}>
                <table>
                  <thead><tr><th>Name</th><th>Username</th><th>Phone</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
                  <tbody>{admins.map(a=><tr key={a.id}>
                    <td style={{fontWeight:600,color:T.text}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:28,height:28,borderRadius:"50%",background:a.role==="super_admin"?"rgba(180,140,40,.15)":T.navy,border:`1.5px solid rgba(180,140,40,.25)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:T.goldL,flexShrink:0}}>{inits(a.name)}</div>
                        {a.name}{a.id===admin.id&&<Chip c="green">You</Chip>}
                      </div>
                    </td>
                    <td style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>{a.username}</td>
                    <td style={{fontSize:11.5,fontFamily:"'JetBrains Mono',monospace",color:a.phone?T.text2:T.text3}}>{a.phone||"—"}</td>
                    <td style={{fontSize:11.5}}>{a.email}</td>
                    <td><Chip c={a.role==="super_admin"?"gold":a.role==="registrar"?"orange":"blue"}>{a.role==="super_admin"?"Super Admin":a.role==="registrar"?"Registrar":"Lecturer"}</Chip></td>
                    <td>
                      <div style={{display:"flex",gap:5}}>
                        <Btn v="ghost" sz="sm" onClick={()=>setEditAdm(a)}><Ico n="edit" s={12}/>Edit</Btn>
                        {a.id!==admin.id&&<Btn v="danger" sz="sm" onClick={()=>{if(window.confirm(`Remove ${a.name}?`)){setAdmins(p=>p.filter(x=>x.id!==a.id));say("Account removed","success");}}}><Ico n="trash" s={12}/></Btn>}
                      </div>
                    </td>
                  </tr>)}</tbody>
                </table>
              </Box>
            </div>}

            {page==="sms" && <div className="anim-in" style={{maxWidth:580}}>
              <Box style={{padding:22,marginBottom:14}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,marginBottom:16}}>SMS Gateway — Africa's Talking</div>
                <FL label="API Username"><input placeholder="Your Africa's Talking username"/></FL>
                <FL label="API Key"><input type="password" placeholder="Your API key"/></FL>
                <FL label="Sender ID"><input defaultValue="SEETA_UNI" placeholder="SEETA_UNI"/></FL>
                <FL label="Environment">
                  <select><option value="sandbox">Sandbox (Testing)</option><option value="live">Live (Production)</option></select>
                </FL>
                <Btn v="gold" onClick={()=>say("SMS configuration saved","success")}><Ico n="save" s={14}/>Save Configuration</Btn>
              </Box>
              <Box style={{padding:22,marginBottom:14}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,marginBottom:16}}>Twilio (Alternative)</div>
                <FL label="Account SID"><input placeholder="ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"/></FL>
                <FL label="Auth Token"><input type="password" placeholder="Auth token"/></FL>
                <FL label="From Number"><input placeholder="+1xxxxxxxxxx"/></FL>
                <Btn v="ghost" onClick={()=>say("Twilio configuration saved","success")}><Ico n="save" s={14}/>Save Twilio Config</Btn>
              </Box>
              <Box style={{padding:18}}>
                <div style={{background:"rgba(180,140,40,.07)",border:`1px solid rgba(180,140,40,.18)`,borderRadius:7,padding:"12px 14px",fontSize:12.5,color:T.text2,lineHeight:1.8}}>
                  <strong style={{color:T.goldL}}>Deployment Instructions:</strong> Configure your Africa's Talking credentials above. Once set, OTP codes will be delivered via SMS to students' registered phone numbers instantly upon check-in. Ensure each student's phone number is captured and saved in the Students section. Africa's Talking supports MTN Uganda, Airtel Uganda, and all major carriers.
                </div>
              </Box>
            </div>}
          </div>
        </div>

        {selStu&&<StudentModal student={selStu} logs={logs} onClose={()=>setSelStu(null)} onEdit={s=>{setSelStu(null);setEditStu(s);}}/>}
        {editStu&&<EditStudentModal student={editStu} onClose={()=>setEditStu(null)} onSave={updated=>{setStudents(p=>p.map(s=>s.id===updated.id?updated:s));setEditStu(null);say(`${updated.name} updated successfully`,"success");}}/>}
        {addStu&&<AddStudentModal students={students} onClose={()=>setAddStu(false)} onSave={s=>{setStudents(p=>[...p,s]);setAddStu(false);say(`${s.name} registered`,"success");}}/>}
        {editAdm&&<EditAdminModal admin={editAdm} onClose={()=>setEditAdm(null)} onSave={updated=>{setAdmins(p=>p.map(a=>a.id===updated.id?updated:a));setEditAdm(null);say(`${updated.name} updated`,"success");}}/>}
        {addAdm&&<AddAdminModal onClose={()=>setAddAdm(false)} onSave={a=>{setAdmins(p=>[...p,a]);setAddAdm(false);say(`${a.name} account created`,"success");}}/>}
        {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      </div>;
    }

    function App() {
      const [students,setStudents]=useState(REGISTRY);
      const [admins,setAdmins]=useState(INITIAL_ADMINS);
      const [logs,setLogs]=useState([]);
      const [view,setView]=useState("checkin");
      const [admin,setAdmin]=useState(null);
      const addLog=useCallback(e=>setLogs(p=>[e,...p]),[]);
      return <>
        <style>{G}</style>
        {view==="checkin"&&<CheckIn students={students} logs={logs} onLog={addLog} goAdmin={()=>setView("login")}/>}
        {view==="login"&&<AdminLogin admins={admins} onLogin={a=>{setAdmin(a);setView("dash");}} onBack={()=>setView("checkin")}/>}
        {view==="dash"&&admin&&<Dashboard admin={admin} students={students} setStudents={setStudents} admins={admins} setAdmins={setAdmins} logs={logs} setLogs={setLogs}/>}
      </>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
